<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>香典返しe-shop ヘッダー デザイン案</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Shippori+Mincho:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --purple:#61438d;        /* 情報帯 */
  --purple-nav:#6d627c;    /* ナビ帯 */
  --purple-dark:#4e3676;
  --red:#cf2e2e;
  --ink:#333;
  --line:#e6e2ec;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Noto Sans JP",sans-serif;color:var(--ink);background:#f3f3f5;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
svg{display:block}

/* ===== 情報帯（紫） ===== */
.info-band{background:var(--purple);color:#fff}
.info-inner{max-width:1180px;margin:0 auto;padding:7px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.info-tag{font-size:13px;font-weight:500;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.info-btns{display:flex;gap:8px;flex-shrink:0}
.info-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.35);color:#fff;font-size:12px;font-weight:500;padding:5px 12px;border-radius:4px;transition:.2s}
.info-btn:hover{background:rgba(255,255,255,.28)}
.info-btn svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}

/* ===== ロゴ行（白） ===== */
.logo-band{background:#fff;border-bottom:1px solid var(--line)}
.logo-inner{max-width:1180px;margin:0 auto;padding:14px 20px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:20px}

/* 左：送料無料＋電話 */
.left-cluster{display:flex;align-items:center;gap:18px;justify-self:start}
.freeship{display:flex;align-items:center;gap:8px;color:var(--red)}
.freeship svg{width:30px;height:30px;stroke:var(--red);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.freeship .fs-main{font-size:19px;font-weight:900;line-height:1.1}
.freeship .fs-sub{font-size:10px;color:#7a7a7a;font-weight:500;margin-top:2px}
.tel-block{display:flex;align-items:center;gap:9px}
.tel-badge{font-size:10px;line-height:1.25;text-align:center;border:1px solid #b9b1c7;color:#5a5168;border-radius:4px;padding:4px 6px;font-weight:700}
.tel-num{display:flex;align-items:center;gap:7px;color:#2c2440}
.tel-num svg{width:22px;height:22px;stroke:var(--purple);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.tel-num .num{font-size:25px;font-weight:900;letter-spacing:.01em;line-height:1}
.tel-hours{font-size:11px;color:#6a6a6a;font-weight:500;margin-top:3px}

/* 中央：ロゴ */
.logo-center{justify-self:center}
.logo-center img{height:64px;width:auto;display:block}

/* 右：検索＋ログイン/カート */
.right-cluster{display:flex;align-items:center;gap:16px;justify-self:end}
.search{display:flex;align-items:center;background:#fff;border:1.5px solid #cfc9da;border-radius:6px;overflow:hidden;height:40px}
.search input{border:0;outline:0;padding:0 12px;font-size:13px;width:170px;font-family:inherit}
.search input::placeholder{color:#9a93a8}
.search button{border:0;background:var(--purple);height:100%;width:42px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.search button svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.icon-link{display:flex;flex-direction:column;align-items:center;gap:4px;color:#43394f;font-size:11px;font-weight:700;position:relative}
.icon-link svg{width:26px;height:26px;stroke:#43394f;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.icon-link:hover{color:var(--purple)}
.icon-link:hover svg{stroke:var(--purple)}
.cart-count{position:absolute;top:-6px;right:2px;background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;padding:0 3px}

/* ===== ナビ帯（紫） ===== */
.nav-band{background:var(--purple-nav)}
.nav-inner{max-width:1180px;margin:0 auto;display:flex;justify-content:center}
.nav-inner a{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:9px;color:#fff;font-size:14.5px;font-weight:500;padding:15px 30px;border-left:1px solid rgba(255,255,255,.18);transition:.2s;letter-spacing:.02em}
.nav-inner a:last-child{border-right:1px solid rgba(255,255,255,.18)}
.nav-inner a:hover{background:rgba(255,255,255,.12)}
.nav-inner svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}

/* ===== ハンバーガー（モバイル用・PCでは非表示） ===== */
.hamb{display:none}

/* ===== レスポンシブ ===== */
@media(max-width:900px){
  .info-btns{display:none}
  .logo-inner{grid-template-columns:1fr auto auto;gap:12px;padding:12px 14px}
  .left-cluster{display:none}
  .logo-center{justify-self:start}
  .logo-center img{height:46px}
  .search{display:none}
  .right-cluster{gap:14px}
  .hamb{display:flex;flex-direction:column;align-items:center;gap:4px;color:#43394f;font-size:11px;font-weight:700;background:none;border:0;cursor:pointer}
  .hamb svg{width:26px;height:26px;stroke:#43394f;fill:none;stroke-width:1.7;stroke-linecap:round}
  .nav-band{display:none}
  .info-tag{font-size:11px;white-space:normal}
  .msearch{display:flex !important}
  .msearch .search{display:flex !important}
}
/* モバイル検索（PCでは隠す） */
.msearch{display:none;background:#f1eff5;padding:10px 14px}
.msearch .search{width:100%;height:42px}
.msearch .search input{width:100%}

/* ---- プレビュー用ダミー本文 ---- */
.demo-note{max-width:1180px;margin:30px auto;padding:0 20px;color:#8a8398;font-size:12px;text-align:center}
</style>
</head>
